name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string
      title:
        description: "Release title (defaults to tag)"
        required: false
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install tools
        run: mise install

      - name: Build wheel and sdist
        run: mise run build -- -Clean

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Install tools
        run: mise install

      - name: Build run-faceless launcher
        run: mise run build-exe -- -Clean

      - name: Upload exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist/*.exe

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build
      - build-exe

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Download exe artifacts
        uses: actions/download-artifact@v4
        with:
          name: exe
          path: exe

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            title="${GITHUB_REF_NAME}"
            prerelease="false"
          else
            tag="${{ inputs.tag }}"
            title="${{ inputs.title }}"
            prerelease="${{ inputs.prerelease }}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '${tag}' must look like v1.2.3 (optionally with suffix)." >&2
            exit 1
          fi

          if [[ -z "${title}" ]]; then
            title="${tag}"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "title=${title}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.meta.outputs.tag }}"
          title="${{ steps.meta.outputs.title }}"
          prerelease="${{ steps.meta.outputs.prerelease }}"

          if gh release view "${tag}" > /dev/null 2>&1; then
            gh release upload "${tag}" dist/* exe/* --clobber
          else
            args=(release create "${tag}" dist/* exe/* --title "${title}" --generate-notes --target "${GITHUB_SHA}")
            if [[ "${prerelease}" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh "${args[@]}"
          fi
